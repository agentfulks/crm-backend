version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vc-crm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-vc_outreach}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - vc-crm-network

  # Optional: Adminer for database management UI
  adminer:
    image: adminer:latest
    container_name: vc-crm-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vc-crm-network

volumes:
  postgres_data:
    name: vc_crm_postgres_data

networks:
  vc-crm-network:
    name: vc_crm_network
    driver: bridge
